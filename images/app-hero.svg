<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Aileron — Emerald &amp; Brass Art Deco interface: floating pop-out bar above the session dashboard">
  <title>Aileron — dashboard-first, screen-share-invisible AI for interviews and meetings</title>

  <defs>
    <style>
      .disp { font-family: "Cinzel", Georgia, "Times New Roman", serif; letter-spacing: 0.18em; }
      .sans { font-family: "Jost", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f7a5e" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#0d1310" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="dashClip"><rect x="140" y="190" width="1320" height="740"/></clipPath>
    <g id="mark">
      <path d="M60 12 L98 100 L79 100 L60 56 L41 100 L22 100 Z" fill="#c69a43"/>
      <path d="M60 40 L81 96 L69 96 L60 72 L51 96 L39 96 Z" fill="#1f7a5e"/>
      <rect x="28" y="102" width="64" height="4" fill="#c69a43"/>
      <rect x="37" y="110" width="46" height="3" fill="#8c7333"/>
    </g>
  </defs>

  <!-- ink-green ground -->
  <rect width="1600" height="1000" fill="#0d1310"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- POP-OUT BAR (floating, screen-share-invisible) -->
  <g>
    <rect x="460" y="86" width="680" height="82" fill="#141c17" stroke="#3c3520"/>
    <!-- status band -->
    <g class="mono" font-size="11">
      <rect x="484" cy="0" y="106" width="7" height="7" fill="#37b088"/>
      <text x="500" y="114" fill="#37b088">listening</text>
      <text x="1116" y="114" fill="#a68e4e" text-anchor="end">⌘⇧M capture · ⌘\ hide</text>
    </g>
    <!-- control row -->
    <g transform="translate(476, 124)">
      <use href="#mark" transform="translate(2,1) scale(0.24)"/>
      <!-- capture -->
      <rect x="40" y="1" width="30" height="30" fill="#17201a" stroke="#3c3520"/>
      <path d="M49 21a6 6 0 0 1 12 0" fill="none" stroke="#a89f84" stroke-width="1.6" stroke-linecap="round"/>
      <rect x="47.5" y="19" width="4.5" height="7" rx="1.6" fill="#a89f84"/>
      <rect x="58" y="19" width="4.5" height="7" rx="1.6" fill="#a89f84"/>
      <!-- input -->
      <rect x="78" y="1" width="438" height="30" fill="#0d1310" stroke="#4a4227"/>
      <text x="92" y="21" class="sans" font-size="13" fill="#a68e4e">Ask me anything…</text>
      <line x1="530" y1="5" x2="530" y2="27" stroke="#3c3520"/>
      <g fill="none" stroke="#a89f84" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M547 10v7a4 4 0 0 0 8 0v-7a4 4 0 0 0-8 0Z"/><path d="M544 18a7 7 0 0 0 14 0"/><path d="M551 25v3"/>
        <rect x="575" y="10" width="16" height="13" rx="2"/><circle cx="583" cy="16.5" r="3"/>
        <path d="M615 13.5 608 21a3.5 3.5 0 0 0 5 5l8-8a5.5 5.5 0 0 0-8-8l-8 8a7.5 7.5 0 0 0 11 11l6-6"/>
      </g>
    </g>
  </g>

  <!-- DASHBOARD -->
  <g clip-path="url(#dashClip)">
    <rect x="140" y="190" width="1320" height="740" fill="#0d1310"/>

    <!-- top bar -->
    <rect x="140" y="190" width="1320" height="52" fill="#121a15"/>
    <line x1="140" y1="242" x2="1460" y2="242" stroke="#3c3520"/>
    <use href="#mark" transform="translate(168,203) scale(0.19)"/>
    <text x="196" y="222" class="disp" font-size="15" fill="#f1e9d5">AILERON</text>
    <g class="mono" font-size="12">
      <rect x="1150" y="212" width="6" height="6" fill="#e0b454"/>
      <text x="1166" y="222" fill="#a68e4e">idle</text>
      <text x="1236" y="222" fill="#a89f84">ollama</text>
      <text x="1290" y="222" fill="#a68e4e">·</text>
      <text x="1302" y="222" fill="#a89f84">fluidaudio</text>
      <rect x="1372" y="205" width="62" height="22" fill="none" stroke="#c69a43"/>
      <text x="1403" y="220" font-size="11" fill="#c69a43" text-anchor="middle">pop out</text>
    </g>

    <!-- column divider -->
    <line x1="962" y1="242" x2="962" y2="930" stroke="#3c3520"/>

    <!-- transcript: heard -->
    <text x="172" y="292" class="mono" font-size="11" fill="#a68e4e">15:14</text>
    <text x="232" y="292" class="sans" font-size="10.5" letter-spacing="0.16em" fill="#a89f84">HEARD</text>
    <text x="232" y="316" class="sans" font-size="14.5" fill="#e2dcc9">Walk me through how you'd triage a high-volume support queue.</text>

    <!-- transcript: answer (emerald rule) -->
    <text x="172" y="368" class="mono" font-size="11" fill="#a68e4e">15:15</text>
    <rect x="230" y="352" width="3" height="150" fill="#1f7a5e"/>
    <text x="250" y="368" class="disp" font-size="11" fill="#c69a43">ANSWER</text>
    <text x="250" y="394" class="sans" font-size="14.5" fill="#f1e9d5">I grab the whole queue and sort by impact, not arrival time. A</text>
    <text x="250" y="418" class="sans" font-size="14.5" fill="#f1e9d5">suspected phishing report jumps first — it's a potential breach</text>
    <text x="250" y="442" class="sans" font-size="14.5" fill="#f1e9d5">that could hit everyone. Then the locked-out exec, then the 40</text>
    <text x="250" y="466" class="sans" font-size="14.5" fill="#f1e9d5">broken logins as a business-continuity issue. It's exactly the flow</text>
    <text x="250" y="490" class="sans" font-size="14.5" fill="#f1e9d5">I ran at Meta, keeping SLAs intact while mitigating the top risk.</text>

    <!-- transcript: heard -->
    <text x="172" y="552" class="mono" font-size="11" fill="#a68e4e">15:19</text>
    <text x="232" y="552" class="sans" font-size="10.5" letter-spacing="0.16em" fill="#a89f84">HEARD</text>
    <text x="232" y="576" class="sans" font-size="14.5" fill="#e2dcc9">Have you ever worked with SOC 2 compliance?</text>

    <!-- transcript: answer streaming -->
    <text x="172" y="628" class="mono" font-size="11" fill="#a68e4e">15:19</text>
    <rect x="230" y="612" width="3" height="86" fill="#1f7a5e"/>
    <text x="250" y="628" class="disp" font-size="11" fill="#c69a43">ANSWER</text>
    <text x="250" y="654" class="sans" font-size="14.5" fill="#f1e9d5">Yes — at AIG I monitored and remediated findings against the</text>
    <text x="250" y="678" class="sans" font-size="14.5" fill="#f1e9d5">automated compliance framework, tracking each to close</text>
    <rect x="686" y="666" width="7" height="16" fill="#37b088"/>

    <!-- session rail -->
    <g class="mono" font-size="11" fill="#a68e4e">
      <text x="994" y="286">session</text>
      <text x="1432" y="286" text-anchor="end">Jul 22 · 1:14</text>
    </g>
    <!-- diamond rule -->
    <g stroke="#c69a43"><line x1="994" y1="300" x2="1200" y2="300"/><line x1="1226" y1="300" x2="1432" y2="300"/></g>
    <path d="M1213 295 l6 5 -6 5 -6 -5 Z" fill="#c69a43"/>
    <!-- tiles -->
    <rect x="994" y="316" width="208" height="70" fill="#121a15" stroke="#3c3520"/>
    <text x="1012" y="356" class="disp" font-size="26" fill="#f1e9d5">9</text>
    <text x="1012" y="374" class="sans" font-size="10.5" letter-spacing="0.14em" fill="#a89f84">QUESTIONS</text>
    <rect x="1224" y="316" width="208" height="70" fill="#121a15" stroke="#3c3520"/>
    <text x="1242" y="356" class="disp" font-size="26" fill="#f1e9d5">7</text>
    <text x="1242" y="374" class="sans" font-size="10.5" letter-spacing="0.14em" fill="#a89f84">ANSWERS</text>

    <!-- sessions -->
    <line x1="994" y1="420" x2="1432" y2="420" stroke="#3c3520"/>
    <text x="994" y="446" class="mono" font-size="11" fill="#a68e4e">sessions</text>
    <g class="sans" font-size="12.5" fill="#e2dcc9">
      <text x="994" y="476">Triage a high-volume queue</text>
      <text x="1432" y="476" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">6h ago</text>
      <text x="994" y="506">How you'd work in Vanta day to day</text>
      <text x="1432" y="506" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">2d ago</text>
      <text x="994" y="536">Okta lifecycle automation</text>
      <text x="1432" y="536" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">4d ago</text>
      <text x="994" y="566">SOC 2 access reviews</text>
      <text x="1432" y="566" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">6d ago</text>
    </g>

    <!-- status -->
    <line x1="994" y1="600" x2="1432" y2="600" stroke="#3c3520"/>
    <text x="994" y="626" class="mono" font-size="11" fill="#a68e4e">status</text>
    <g class="mono" font-size="12">
      <text x="994" y="656" fill="#a89f84">on-device stt</text>
      <rect x="1327" y="649" width="6" height="6" fill="#37b088"/>
      <text x="1432" y="656" fill="#37b088" text-anchor="end">local-fluidaudio</text>
      <text x="994" y="686" fill="#a89f84">model</text>
      <rect x="1327" y="679" width="6" height="6" fill="#37b088"/>
      <text x="1432" y="686" fill="#37b088" text-anchor="end">gpt-oss:20b-cloud</text>
    </g>
  </g>
  <rect x="140" y="190" width="1320" height="740" fill="none" stroke="#3c3520"/>
</svg>
