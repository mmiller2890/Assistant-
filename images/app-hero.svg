<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Assistant — slate and signal interface: floating pop-out bar above the session dashboard">
  <title>Assistant — dashboard-first, screen-share-invisible AI for interviews and meetings</title>

  <defs>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Geist, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    </style>
    <radialGradient id="glow" cx="50%" cy="12%" r="65%">
      <stop offset="0%" stop-color="#4DA3FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="dashClip"><rect x="140" y="190" width="1320" height="740" rx="14"/></clipPath>
  </defs>

  <!-- base steel -->
  <rect width="1600" height="1000" fill="#0E1116"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- POP-OUT BAR (two-band instrument) -->
  <g>
    <rect x="460" y="86" width="680" height="82" rx="10" fill="#151A21" stroke="#2E3947"/>

    <!-- status band -->
    <g class="mono" font-size="11">
      <circle cx="486" cy="110" r="3.5" fill="#4DA3FF"/>
      <text x="498" y="114" fill="#4DA3FF">listening</text>
      <text x="1116" y="114" fill="#57646F" text-anchor="end">⌘⇧M capture · ⌘\ hide</text>
    </g>

    <!-- control row -->
    <g transform="translate(476, 126)">
      <!-- logo mark → dashboard -->
      <rect x="0" y="0" width="30" height="30" rx="6" fill="none" stroke="#4DA3FF"/>
      <rect x="11.5" y="11.5" width="7" height="7" rx="2" fill="#4DA3FF"/>
      <!-- capture -->
      <rect x="38" y="0" width="30" height="30" rx="6" fill="#1B222B" stroke="#232B35"/>
      <path d="M47 20a6 6 0 0 1 12 0" fill="none" stroke="#93A2B2" stroke-width="1.6" stroke-linecap="round"/>
      <rect x="45.5" y="18" width="4.5" height="7" rx="1.6" fill="#93A2B2"/>
      <rect x="56" y="18" width="4.5" height="7" rx="1.6" fill="#93A2B2"/>
      <!-- input -->
      <rect x="76" y="0" width="440" height="30" rx="6" fill="#0E1116" stroke="#232B35"/>
      <text x="90" y="20" class="sans" font-size="13" fill="#57646F">Ask me anything…</text>
      <!-- hairline separator -->
      <line x1="528" y1="4" x2="528" y2="26" stroke="#232B35"/>
      <!-- accessory cluster -->
      <g fill="none" stroke="#93A2B2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M545 9v7a4 4 0 0 0 8 0V9a4 4 0 0 0-8 0Z"/><path d="M542 17a7 7 0 0 0 14 0"/><path d="M549 24v3"/>
        <rect x="573" y="9" width="16" height="13" rx="2"/><circle cx="581" cy="15.5" r="3"/>
        <path d="M613 12.5 606 20a3.5 3.5 0 0 0 5 5l8-8a5.5 5.5 0 0 0-8-8l-8 8a7.5 7.5 0 0 0 11 11l6-6"/>
      </g>
    </g>
  </g>

  <!-- DASHBOARD -->
  <g clip-path="url(#dashClip)">
    <rect x="140" y="190" width="1320" height="740" fill="#0E1116"/>

    <!-- statusline -->
    <rect x="140" y="190" width="1320" height="52" fill="#151A21"/>
    <line x1="140" y1="242" x2="1460" y2="242" stroke="#232B35"/>
    <rect x="168" y="206" width="20" height="20" rx="5" fill="none" stroke="#4DA3FF"/>
    <rect x="175" y="213" width="6" height="6" rx="2" fill="#4DA3FF"/>
    <text x="198" y="222" class="sans" font-size="14" font-weight="500" fill="#E7ECF2">Assistant</text>
    <g class="mono" font-size="12">
      <text x="1160" y="222" fill="#57646F">idle</text>
      <text x="1198" y="222" fill="#57646F">|</text>
      <text x="1212" y="222" fill="#93A2B2">ollama</text>
      <text x="1264" y="222" fill="#57646F">·</text>
      <text x="1276" y="222" fill="#93A2B2">fluidaudio</text>
      <rect x="1352" y="205" width="82" height="22" rx="5" fill="#1B222B" stroke="#232B35"/>
      <text x="1393" y="220" font-size="11" fill="#93A2B2" text-anchor="middle">pop out</text>
    </g>

    <!-- column divider -->
    <line x1="962" y1="242" x2="962" y2="930" stroke="#232B35"/>

    <!-- transcript feed -->
    <!-- turn 1: heard -->
    <text x="172" y="292" class="mono" font-size="11" fill="#57646F">09:24</text>
    <text x="232" y="292" class="mono" font-size="11" fill="#93A2B2">heard</text>
    <text x="232" y="316" class="sans" font-size="14.5" fill="#E7ECF2">Walk me through how you'd design a rate limiter for a public API.</text>

    <!-- turn 2: answer (signal rule) -->
    <text x="172" y="368" class="mono" font-size="11" fill="#57646F">09:24</text>
    <rect x="232" y="352" width="2" height="150" fill="#4DA3FF"/>
    <text x="248" y="368" class="mono" font-size="11" fill="#4DA3FF">answer</text>
    <text x="248" y="394" class="sans" font-size="14.5" fill="#E7ECF2">Start with the algorithm: a token bucket per client key gives smooth</text>
    <text x="248" y="418" class="sans" font-size="14.5" fill="#E7ECF2">bursts with a hard ceiling. Store counters in Redis with atomic</text>
    <g>
      <rect x="248" y="430" width="48" height="20" rx="4" fill="#1B222B"/>
      <text x="272" y="444" class="mono" font-size="11.5" fill="#4DA3FF" text-anchor="middle">INCR</text>
      <text x="304" y="444" class="sans" font-size="14.5" fill="#E7ECF2">+ TTL, keyed by API key and window.</text>
    </g>
    <text x="248" y="478" class="sans" font-size="14.5" fill="#E7ECF2">Then decide where it runs: edge for blunt protection, gateway for</text>
    <text x="248" y="498" class="sans" font-size="14.5" fill="#E7ECF2">per-tenant fairness.</text>

    <!-- turn 3: heard -->
    <text x="172" y="552" class="mono" font-size="11" fill="#57646F">09:26</text>
    <text x="232" y="552" class="mono" font-size="11" fill="#93A2B2">heard</text>
    <text x="232" y="576" class="sans" font-size="14.5" fill="#E7ECF2">How would you handle a distributed counter without hot keys?</text>

    <!-- turn 4: answer streaming -->
    <text x="172" y="628" class="mono" font-size="11" fill="#57646F">09:26</text>
    <rect x="232" y="612" width="2" height="86" fill="#4DA3FF"/>
    <text x="248" y="628" class="mono" font-size="11" fill="#4DA3FF">answer</text>
    <text x="248" y="654" class="sans" font-size="14.5" fill="#E7ECF2">Shard the key space and reconcile: N sub-counters per tenant, each</text>
    <text x="248" y="678" class="sans" font-size="14.5" fill="#E7ECF2">incremented independently, summed on read</text>
    <rect x="676" y="664" width="7" height="17" fill="#4DA3FF"/>

    <!-- session rail -->
    <g class="mono" font-size="11" fill="#57646F">
      <text x="994" y="286">session</text>
      <text x="1432" y="286" text-anchor="end">Jul 16 · 12:04</text>
    </g>
    <!-- tiles -->
    <rect x="994" y="300" width="208" height="66" rx="8" fill="#151A21" stroke="#232B35"/>
    <text x="1012" y="336" class="mono" font-size="24" font-weight="500" fill="#E7ECF2">6</text>
    <text x="1012" y="354" class="sans" font-size="11.5" fill="#93A2B2">questions</text>
    <rect x="1224" y="300" width="208" height="66" rx="8" fill="#151A21" stroke="#232B35"/>
    <text x="1242" y="336" class="mono" font-size="24" font-weight="500" fill="#E7ECF2">6</text>
    <text x="1242" y="354" class="sans" font-size="11.5" fill="#93A2B2">answers</text>

    <!-- sessions -->
    <line x1="994" y1="400" x2="1432" y2="400" stroke="#232B35"/>
    <text x="994" y="426" class="mono" font-size="11" fill="#57646F">sessions</text>
    <g class="sans" font-size="12.5" fill="#E7ECF2">
      <text x="994" y="456">Rate limiter design</text>
      <text x="1432" y="456" class="mono" font-size="10.5" fill="#57646F" text-anchor="end">2m ago</text>
      <text x="994" y="486">Systems design prep</text>
      <text x="1432" y="486" class="mono" font-size="10.5" fill="#57646F" text-anchor="end">1h ago</text>
      <text x="994" y="516">Consistency &amp; quorums</text>
      <text x="1432" y="516" class="mono" font-size="10.5" fill="#57646F" text-anchor="end">3h ago</text>
      <text x="994" y="546">Caching strategies</text>
      <text x="1432" y="546" class="mono" font-size="10.5" fill="#57646F" text-anchor="end">1d ago</text>
    </g>

    <!-- status -->
    <line x1="994" y1="580" x2="1432" y2="580" stroke="#232B35"/>
    <text x="994" y="606" class="mono" font-size="11" fill="#57646F">status</text>
    <g class="mono" font-size="12">
      <text x="994" y="636" fill="#93A2B2">on-device stt</text>
      <circle cx="1330" cy="632" r="3.5" fill="#3FD99B"/>
      <text x="1432" y="636" fill="#3FD99B" text-anchor="end">fluidaudio</text>
      <text x="994" y="666" fill="#93A2B2">model</text>
      <circle cx="1330" cy="662" r="3.5" fill="#3FD99B"/>
      <text x="1432" y="666" fill="#3FD99B" text-anchor="end">llama3.1</text>
    </g>
  </g>
  <rect x="140" y="190" width="1320" height="740" rx="14" fill="none" stroke="#232B35"/>
</svg>
