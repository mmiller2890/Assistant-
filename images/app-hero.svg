<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Aileron — Emerald and Brass Art Deco dashboard: nav sidebar, embedded capture bar, live transcript with answers, and a session rail">
  <title>Aileron — dashboard-first, screen-share-invisible AI for interviews and meetings</title>

  <defs>
    <style>
      .disp { font-family: "Cinzel", Georgia, "Times New Roman", serif; letter-spacing: 0.18em; }
      .sans { font-family: "Jost", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f7a5e" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#0d1310" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="win"><rect x="120" y="96" width="1360" height="812"/></clipPath>
    <g id="mark">
      <path d="M60 12 L98 100 L79 100 L60 56 L41 100 L22 100 Z" fill="#c69a43"/>
      <path d="M60 40 L81 96 L69 96 L60 72 L51 96 L39 96 Z" fill="#1f7a5e"/>
      <rect x="28" y="102" width="64" height="4" fill="#c69a43"/>
      <rect x="37" y="110" width="46" height="3" fill="#8c7333"/>
    </g>
  </defs>

  <rect width="1600" height="1000" fill="#0d1310"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <g clip-path="url(#win)">
    <rect x="120" y="96" width="1360" height="812" fill="#0d1310"/>

    <!-- SIDEBAR -->
    <rect x="120" y="96" width="224" height="812" fill="#0a0f0c"/>
    <line x1="344" y1="96" x2="344" y2="908" stroke="#3c3520"/>
    <!-- emerald reeded spine -->
    <g fill="#1f7a5e" opacity="0.6"><rect x="341" y="96" width="3" height="6"/><rect x="341" y="107" width="3" height="6"/><rect x="341" y="118" width="3" height="6"/><rect x="341" y="129" width="3" height="6"/><rect x="341" y="140" width="3" height="6"/><rect x="341" y="151" width="3" height="6"/><rect x="341" y="162" width="3" height="6"/></g>
    <!-- window dots -->
    <circle cx="146" cy="120" r="5" fill="#3c3520"/><circle cx="164" cy="120" r="5" fill="#3c3520"/><circle cx="182" cy="120" r="5" fill="#3c3520"/>
    <!-- brand -->
    <use href="#mark" transform="translate(210,150) scale(0.36)"/>
    <text x="232" y="222" class="disp" font-size="18" fill="#f1e9d5" text-anchor="middle">AILERON</text>
    <text x="232" y="240" class="mono" font-size="9" letter-spacing="0.2em" fill="#a68e4e" text-anchor="middle">v0.1.9</text>
    <!-- chevron rule -->
    <g stroke="#c69a43"><line x1="156" y1="264" x2="212" y2="264"/><line x1="252" y1="264" x2="308" y2="264"/></g>
    <path d="M226 268 l6 -6 6 6" fill="none" stroke="#c69a43" stroke-width="1.5"/>
    <!-- nav -->
    <g class="sans" font-size="12" letter-spacing="0.14em" fill="#a89f84">
      <rect x="120" y="300" width="3" height="30" fill="#1f7a5e"/>
      <rect x="123" y="300" width="221" height="30" fill="#17201a"/>
      <text x="156" y="319" fill="#c69a43">DASHBOARD</text>
      <text x="156" y="361">CHATS</text>
      <text x="156" y="401">SYSTEM PROMPTS</text>
      <text x="156" y="441">APP SETTINGS</text>
      <text x="156" y="481">RESPONSES</text>
      <text x="156" y="521">SHORTCUTS</text>
      <text x="156" y="561">DEV SPACE</text>
    </g>
    <g stroke="#c69a43"><line x1="156" y1="836" x2="212" y2="836"/><line x1="252" y1="836" x2="308" y2="836"/></g>
    <path d="M226 832 l6 -6 6 6" fill="none" stroke="#c69a43" stroke-width="1.5"/>
    <g class="sans" font-size="12" letter-spacing="0.14em" fill="#a89f84">
      <text x="156" y="872">REPORT A BUG</text>
      <text x="156" y="900">QUIT AILERON</text>
    </g>

    <!-- EMBEDDED BAR -->
    <rect x="344" y="96" width="1136" height="112" fill="#121a15"/>
    <line x1="344" y1="208" x2="1480" y2="208" stroke="#3c3520"/>
    <!-- status band -->
    <g class="mono" font-size="11">
      <rect x="372" y="122" width="6" height="6" fill="#e0b454"/>
      <text x="388" y="130" fill="#a68e4e">idle</text>
      <text x="1456" y="130" fill="#a89f84" text-anchor="end">ollama · local-fluidaudio</text>
    </g>
    <!-- control row -->
    <g transform="translate(372,150)">
      <rect x="0" y="0" width="112" height="34" fill="#17201a" stroke="#3c3520"/>
      <g stroke="#37b088" stroke-width="1.6" stroke-linecap="round"><path d="M16 12v10M22 9v16M28 13v8M34 15v4"/></g>
      <text x="46" y="21" class="sans" font-size="12" letter-spacing="0.12em" fill="#e2dcc9">CAPTURE</text>
      <rect x="124" y="0" width="792" height="34" fill="#0d1310" stroke="#4a4227"/>
      <text x="140" y="22" class="sans" font-size="13" fill="#a68e4e">Ask a question…</text>
      <g stroke="#a89f84" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="928" y="0" width="34" height="34"/><path d="M938 17h14M947 12l-9 5 9 5"/>
        <rect x="972" y="0" width="34" height="34"/><path d="M989 8l3 6 6 1-4.5 4 1 6-5.5-3-5.5 3 1-6-4.5-4 6-1Z"/>
        <rect x="1016" y="0" width="34" height="34"/><path d="M1026 14a7 7 0 1 1-1 5M1026 12v4h4"/>
        <rect x="1060" y="0" width="34" height="34"/><path d="M1070 22v-9h9M1071 24l9-9M1073 27h11v-11"/>
      </g>
    </g>

    <!-- TRANSCRIPT -->
    <line x1="1050" y1="208" x2="1050" y2="908" stroke="#3c3520"/>
    <text x="376" y="266" class="mono" font-size="11" fill="#a68e4e">15:14</text>
    <text x="436" y="266" class="sans" font-size="10.5" letter-spacing="0.16em" fill="#a89f84">HEARD</text>
    <text x="436" y="290" class="sans" font-size="14.5" fill="#e2dcc9">Walk me through how you'd triage a high-volume support queue.</text>

    <text x="376" y="342" class="mono" font-size="11" fill="#a68e4e">15:15</text>
    <rect x="434" y="326" width="3" height="150" fill="#1f7a5e"/>
    <text x="454" y="342" class="disp" font-size="11" fill="#c69a43">ANSWER</text>
    <text x="454" y="368" class="sans" font-size="14.5" fill="#f1e9d5">I grab the whole queue and sort by impact, not arrival time. A</text>
    <text x="454" y="392" class="sans" font-size="14.5" fill="#f1e9d5">suspected phishing report jumps first — it's a potential breach</text>
    <text x="454" y="416" class="sans" font-size="14.5" fill="#f1e9d5">that could hit everyone. Then the locked-out exec, then the 40</text>
    <text x="454" y="440" class="sans" font-size="14.5" fill="#f1e9d5">broken logins as a business-continuity issue — exactly the flow</text>
    <text x="454" y="464" class="sans" font-size="14.5" fill="#f1e9d5">I ran at Meta, keeping SLAs intact while mitigating the top risk.</text>

    <text x="376" y="526" class="mono" font-size="11" fill="#a68e4e">15:19</text>
    <text x="436" y="526" class="sans" font-size="10.5" letter-spacing="0.16em" fill="#a89f84">HEARD</text>
    <text x="436" y="550" class="sans" font-size="14.5" fill="#e2dcc9">Have you ever worked with SOC 2 compliance?</text>

    <text x="376" y="602" class="mono" font-size="11" fill="#a68e4e">15:19</text>
    <rect x="434" y="586" width="3" height="86" fill="#1f7a5e"/>
    <text x="454" y="602" class="disp" font-size="11" fill="#c69a43">ANSWER</text>
    <text x="454" y="628" class="sans" font-size="14.5" fill="#f1e9d5">Yes — at AIG I monitored and remediated findings against the</text>
    <text x="454" y="652" class="sans" font-size="14.5" fill="#f1e9d5">automated compliance framework, tracking each to close</text>
    <rect x="890" y="640" width="7" height="16" fill="#37b088"/>

    <!-- RAIL -->
    <g class="mono" font-size="11" fill="#a68e4e">
      <text x="1082" y="262">session</text>
      <text x="1456" y="262" text-anchor="end">Jul 22 · 1:14</text>
    </g>
    <g stroke="#c69a43"><line x1="1082" y1="278" x2="1250" y2="278"/><line x1="1288" y1="278" x2="1456" y2="278"/></g>
    <path d="M1269 273 l6 5 -6 5 -6 -5 Z" fill="#c69a43"/>
    <rect x="1082" y="294" width="180" height="70" fill="#121a15" stroke="#3c3520"/>
    <text x="1100" y="334" class="disp" font-size="26" fill="#f1e9d5">9</text>
    <text x="1100" y="352" class="sans" font-size="10" letter-spacing="0.14em" fill="#a89f84">QUESTIONS</text>
    <rect x="1276" y="294" width="180" height="70" fill="#121a15" stroke="#3c3520"/>
    <text x="1294" y="334" class="disp" font-size="26" fill="#f1e9d5">7</text>
    <text x="1294" y="352" class="sans" font-size="10" letter-spacing="0.14em" fill="#a89f84">ANSWERS</text>

    <line x1="1082" y1="398" x2="1456" y2="398" stroke="#3c3520"/>
    <text x="1082" y="424" class="mono" font-size="11" fill="#a68e4e">sessions</text>
    <g class="sans" font-size="12.5" fill="#e2dcc9">
      <text x="1082" y="454">Triage a high-volume queue</text>
      <text x="1456" y="454" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">6h ago</text>
      <text x="1082" y="484">Work in Vanta day to day</text>
      <text x="1456" y="484" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">2d ago</text>
      <text x="1082" y="514">Okta lifecycle automation</text>
      <text x="1456" y="514" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">4d ago</text>
      <text x="1082" y="544">SOC 2 access reviews</text>
      <text x="1456" y="544" class="mono" font-size="10.5" fill="#a68e4e" text-anchor="end">6d ago</text>
    </g>

    <line x1="1082" y1="578" x2="1456" y2="578" stroke="#3c3520"/>
    <text x="1082" y="604" class="mono" font-size="11" fill="#a68e4e">status</text>
    <g class="mono" font-size="12">
      <text x="1082" y="634" fill="#a89f84">on-device stt</text>
      <rect x="1330" y="627" width="6" height="6" fill="#37b088"/>
      <text x="1456" y="634" fill="#37b088" text-anchor="end">local-fluidaudio</text>
      <text x="1082" y="664" fill="#a89f84">model</text>
      <rect x="1330" y="657" width="6" height="6" fill="#37b088"/>
      <text x="1456" y="664" fill="#37b088" text-anchor="end">gpt-oss:20b-cloud</text>
    </g>
  </g>
  <rect x="120" y="96" width="1360" height="812" fill="none" stroke="#3c3520"/>
</svg>
